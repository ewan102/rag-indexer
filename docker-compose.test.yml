services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672"       # Dynamic host port -- use docker_services.port_for()
      - "15672"      # Management UI (optional, for debugging)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 10s
      retries: 5
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
